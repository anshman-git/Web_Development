<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="block-a">
            <div class="seca">
                <div class="logo">
                    <img src="logo.jpg">
                </div>
            </div>
            <div class="secb">
                <div class="box">
                    <div class="a">Sign in or create account</div>
                    <div class="b">
                        <form>
                            <b>Enter mobile number or email</b>
                            <div class="email"><input type="email"></div><br>
                            <div class="pass"><button class="Continue">Continue</button></div>
                        </form>
                    </div>
                    <div class="c">
                        <p>By continuing, you agree to Amazon's Conditions of Use and Privacy Notice.</p>
                    </div>
                    <div class="d">
                        <span><a href="#">Need help?</a></span>
                    </div>
                    <div class="e">
                        <hr>
                    </div>
                    <div class="f">
                        <p>Buying for work?</p>
                    </div>
                    <div class="g">
                        <p><a href="#">Create a free business account</a></p>
                    </div>
                </div>
            </div>
            <hr>
            <div class="secc">
                <div class="links">
                    <div class="condi"><a href="#">Conditions of Use</a></div>
                    <span></span>
                    <div class="Privacy"><a href="#">Privacy Notice</a></div>
                    <span></span>
                    <div class="help"><a href="#">Help</a></div>
                </div>
                <div class="copy">© 1996-2026, Amazon.com, Inc. or its affiliates</div>
            </div>
        </div>

    </div>
</body>
</html>
