<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook-Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="main">
        <div class="parta">
            <div class="logo">
                <img src="https://marketplace.canva.com/KrzKM/MAGzNqKrzKM/1/tl/canva-facebook-logo-MAGzNqKrzKM.png">

            </div>
            <div class="message">
                <span>
                    Explore<br>the things<br>
                    <span>you love</span>.
                </span>
            </div>
            <div class="image">
                <img src="https://static.xx.fbcdn.net/rsrc.php/y0/r/U45qBJmWVHU.webp">
            </div>
        </div>

        <div class="seperator"></div>
        <div class="partb">  
            <div class="login">
                <div class="loginmessbox">
                    <div class="loginmess">
                        Login to Facebook
                    </div>
                </div>
                <div class="entry">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address or mobile number</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                        <label for="floatingPassword">Password</label>
                    </div>
                </div>
    
                <div class="d-grid gap-2">
                    <button class="btn btn-primary newt" type="button">Login</button>
                    <button class="btn " type="button">Forgotten password?</button>
                </div>
                <div >
                    <button type="button" class="btn btn-outline newt">Create new account</button>
                </div>
            </div>
        </div>
    </div>
    <div class="line">
        <hr>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
